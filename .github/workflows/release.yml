name: Create Release Tag & Notes

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: previous_tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tags found. This will be the first release."
          else
            echo "Previous tag: $PREV_TAG"
          fi

      - name: Determine next version
        id: next_version
        run: |
          PREV_TAG="${{ steps.previous_tag.outputs.tag }}"
          
          if [ -z "$PREV_TAG" ]; then
            # First release, use 0.9.2 (since current is 0.9.1)
            NEXT_VERSION="0.9.2"
          else
            # Extract version numbers
            VERSION=$(echo $PREV_TAG | sed 's/^v//')
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3)
            
            # Check commits since last tag for breaking changes or features
            COMMITS=$(git log $PREV_TAG..HEAD --oneline)
            
            if echo "$COMMITS" | grep -qi "BREAKING\|MAJOR"; then
              # Major version bump
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
            elif echo "$COMMITS" | grep -qiE "\[FEATURE\]|feat(\(.+\))?:"; then
              # Minor version bump (feature)
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              # Patch version bump (bugfix/hotfix)
              PATCH=$((PATCH + 1))
            fi
            
            NEXT_VERSION="$MAJOR.$MINOR.$PATCH"
          fi
          
          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "Next version: $NEXT_VERSION"

      - name: Generate release notes
        id: release_notes
        env:
          PREV_TAG: ${{ steps.previous_tag.outputs.tag }}
        run: |
          if [ -z "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %h: %s" | head -20)
          else
            NOTES=$(git log $PREV_TAG..HEAD --pretty=format:"- %h: %s")
          fi
          
          FEATURES=$(echo "$NOTES" | grep -iE "\[FEATURE\]|feat(\(.+\))?:" || echo "")
          BUGFIXES=$(echo "$NOTES" | grep -iE "\[BUGFIX\]|\[HOTFIX\]|fix(\(.+\))?:" || echo "")
          CHORES=$(echo "$NOTES" | grep -iE "\[CHORE\]|chore(\(.+\))?:|docs(\(.+\))?:" || echo "")
          OTHER=$(echo "$NOTES" | grep -viE "\[FEATURE\]|\[BUGFIX\]|\[HOTFIX\]|\[CHORE\]|feat(\(.+\))?:|fix(\(.+\))?:|chore(\(.+\))?:|docs(\(.+\))?:" || echo "")
          
          {
            echo "notes<<EOF"
            echo "## Changes in v${{ steps.next_version.outputs.version }}"
            if [ -n "$FEATURES" ]; then
              printf "\n### ✨ Features\n%s\n" "$FEATURES"
            fi
            if [ -n "$BUGFIXES" ]; then
              printf "\n### 🐛 Bug Fixes\n%s\n" "$BUGFIXES"
            fi
            if [ -n "$CHORES" ]; then
              printf "\n### 🔧 Chores\n%s\n" "$CHORES"
            fi
            if [ -n "$OTHER" ]; then
              printf "\n### 📦 Other\n%s\n" "$OTHER"
            fi
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a v${{ steps.next_version.outputs.version }} -m "Release v${{ steps.next_version.outputs.version }}" HEAD
          git push origin v${{ steps.next_version.outputs.version }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.next_version.outputs.version }}" \
            --title "Release v${{ steps.next_version.outputs.version }}" \
            --notes "${{ steps.release_notes.outputs.notes }}"
