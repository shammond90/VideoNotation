<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cuetation — Cue Sheet Management for Live Production</title>
    <meta name="description" content="Cuetation is a cue sheet management tool for live production. Build, organise, and export cue sheets with video-synchronised timing — built for stage managers and production teams." />
    <link rel="canonical" href="https://cuetation.com/" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cuetation.com/" />
    <meta property="og:title" content="Cuetation — Cue Sheet Management for Live Production" />
    <meta property="og:description" content="Build, organise, and export cue sheets with video-synchronised timing. Built for stage managers and production teams." />
    <meta property="og:site_name" content="Cuetation" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Cuetation — Cue Sheet Management for Live Production" />
    <meta name="twitter:description" content="Build, organise, and export cue sheets with video-synchronised timing. Built for stage managers and production teams." />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Apply saved theme class before first paint to prevent flash.
      // For brand-new users (no saved theme), detect OS preference.
      (function() {
        try {
          var t = localStorage.getItem('cuetation-theme');
          if (!t) {
            t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'bright' : 'standard';
            localStorage.setItem('cuetation-theme', t);
          }
          if (t && t !== 'standard') {
            document.getElementById('root').className = 'theme-' + t;
          }
        } catch(e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
