name: Create Release Tag & Notes

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: previous_tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tags found. This will be the first release."
          else
            echo "Previous tag: $PREV_TAG"
          fi

      - name: Determine next version
        id: next_version
        run: |
          PREV_TAG="${{ steps.previous_tag.outputs.tag }}"
          
          if [ -z "$PREV_TAG" ]; then
            # First release, use 0.9.2 (since current is 0.9.1)
            NEXT_VERSION="0.9.2"
          else
            # Extract version numbers
            VERSION=$(echo $PREV_TAG | sed 's/^v//')
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3)
            
            # Check commits since last tag for breaking changes or features
            COMMITS=$(git log $PREV_TAG..HEAD --oneline)
            
            if echo "$COMMITS" | grep -qi "BREAKING\|MAJOR"; then
              # Major version bump
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
            elif echo "$COMMITS" | grep -qi "\[FEATURE\]\|^feat:"; then
              # Minor version bump (feature)
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              # Patch version bump (bugfix/hotfix)
              PATCH=$((PATCH + 1))
            fi
            
            NEXT_VERSION="$MAJOR.$MINOR.$PATCH"
          fi
          
          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "Next version: $NEXT_VERSION"

      - name: Generate release notes
        id: release_notes
        env:
          PREV_TAG: ${{ steps.previous_tag.outputs.tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$PREV_TAG" ]; then
            # No previous tag, show all commits
            NOTES=$(git log --pretty=format:"- %h: %s" | head -20)
          else
            # Show commits since last tag
            NOTES=$(git log $PREV_TAG..HEAD --pretty=format:"- %h: %s")
          fi
          
          # Categorize commits
          FEATURES=$(echo "$NOTES" | grep -E "^\- [a-f0-9]+: \[FEATURE\]|feat:" || echo "")
          BUGFIXES=$(echo "$NOTES" | grep -E "^\- [a-f0-9]+: \[BUGFIX\]|\[HOTFIX\]|fix:" || echo "")
          CHORES=$(echo "$NOTES" | grep -E "^\- [a-f0-9]+: \[CHORE\]|chore:|docs:" || echo "")
          
          RELEASE_NOTES="## Changes in v${{ steps.next_version.outputs.version }}"
          
          if [ ! -z "$FEATURES" ]; then
            RELEASE_NOTES="$RELEASE_NOTES

### Ō£© Features
$FEATURES"
          fi
          
          if [ ! -z "$BUGFIXES" ]; then
            RELEASE_NOTES="$RELEASE_NOTES

### ­¤Éø Bug Fixes
$BUGFIXES"
          fi
          
          if [ ! -z "$CHORES" ]; then
            RELEASE_NOTES="$RELEASE_NOTES

### ­¤ö¦ Chores
$CHORES"
          fi
          
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a v${{ steps.next_version.outputs.version }} -m "Release v${{ steps.next_version.outputs.version }}" HEAD
          git push origin v${{ steps.next_version.outputs.version }}

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.next_version.outputs.version }}
          release_name: Release v${{ steps.next_version.outputs.version }}
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: false
