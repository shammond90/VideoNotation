<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#141416" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Cuetation</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Apply saved theme class before first paint to prevent flash.
      // For brand-new users (no saved theme), detect OS preference.
      (function() {
        try {
          var t = localStorage.getItem('cuetation-theme');
          if (!t) {
            t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'bright' : 'standard';
            localStorage.setItem('cuetation-theme', t);
          }
          if (t && t !== 'standard') {
            document.getElementById('root').className = 'theme-' + t;
          }
        } catch(e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
